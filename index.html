function renderTabs(){
const tabs=document.getElementById("tabs");
tabs.innerHTML="";
categories.forEach(cat=>{
const btn=document.createElement("div");
btn.className="tab "+(cat.id===currentCategory?"active":"");
btn.innerText=language==='es'?cat.es:cat.en;
btn.onclick=()=>{currentCategory=cat.id;renderTabs();renderMenu();};
tabs.appendChild(btn);
});}

function renderMenu(){
const menu=document.getElementById("menu");
menu.innerHTML="";
menuData.filter(item=>item.cat===currentCategory).forEach(item=>{
const div=document.createElement("div");
div.className="menu-item";
div.innerHTML=`
<img src="${item.img}">
<div class="menu-info">
<h3>${language==='es'?item.es:item.en}</h3>
${item.desc_es ? `<p style="font-size:13px;color:#555;">${language==='es'?item.desc_es:item.desc_en}</p>` : ""}
<p class="price">₡${item.crc} / $${item.usd}</p>
<a class="btn" href="https://wa.me/50662202314" target="_blank">
${language==='es'?'Pedir por WhatsApp':'Order via WhatsApp'}
</a>
</div>`;
menu.appendChild(div);
});}

function toggleLanguage(){
language=language==='es'?'en':'es';
document.getElementById("subtitle").innerText=language==='es'?'Disfruta la vida sin prisa':'Enjoy life slowly';
document.getElementById("locationTitle").innerText=language==='es'?'Ubicación':'Location';
renderTabs();renderMenu();}
